sonar.projectKey=sonar-solutions_playwright-test
sonar.organization=sonar-solutions

# This is the name displayed in the SonarCloud UI.
sonar.projectName=Playwright Test Metrics Demo

# Path is relative to the sonar-project.properties file.
sonar.sources=src
sonar.tests=tests
sonar.exclusions=node_modules/**,dist/**,playwright-report/**,test-results/**,coverage/**

# Encoding of the source code.
sonar.sourceEncoding=UTF-8

# Playwright test execution metrics. This report is generated before the SonarQube Scan step.
sonar.testExecutionReportPaths=reports/sonar-playwright.xml

# If you add Istanbul/nyc coverage later, generate coverage/lcov.info and uncomment this line:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
